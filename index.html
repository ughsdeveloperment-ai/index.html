<!DOCTYPE html>
<html>
<head>
<title>UGHS Result 2025-2026</title>
</head>

<body style="font-family:Arial; text-align:center;">

<h2>UGHS EXAMINATION RESULT 2025-2026</h2>

<p><b>District:</b> Gajapati</p>
<p><b>Centre Name:</b> Koinpur</p>
<p><b>Centre Code:</b> GK2025</p>

<input type="text" id="roll" placeholder="Enter Roll Number">
<button onclick="searchResult()">Search</button>

<div id="output"></div>

<script>

var students = {
"E-1": {name:"Student One", gk:40, math:45, english:42},
"E-2": {name:"Student Two", gk:38, math:44, english:40},
"E-3": {name:"Student Three", gk:45, math:48, english:44}
};

function searchResult(){

var roll = document.getElementById("roll").value;
var data = students[roll];

if(data){

var total = data.gk + data.math + data.english;
var status = total >= 120 ? "PASS" : "FAIL";

document.getElementById("output").innerHTML =
"<h3>Result</h3>" +
"Name: " + data.name + "<br>" +
"Roll No: " + roll + "<br><br>" +

"GK: " + data.gk + " / 70<br>" +
"Math: " + data.math + " / 70<br>" +
"English: " + data.english + " / 60<br><br>" +

"<b>Total: " + total + " / 200</b><br>" +
"<b>Status: " + status + "</b>";

}
else{
document.getElementById("output").innerHTML = "Result Not Found";
}

}

</script>

</body>
</html>
