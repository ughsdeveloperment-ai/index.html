<!DOCTYPE html>
<html>
<head>
<title>UGHS Result 2025-2026</title>
<style>
body{font-family:Arial;text-align:center;background:#f2f2f2;}
.box{background:white;padding:20px;margin:20px auto;width:90%;max-width:600px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
table,th,td{border:1px solid black;padding:6px;}
button{padding:6px 10px;}
input{padding:6px;}
</style>
</head>

<body>

<div class="box">

<h2>UGHS EXAMINATION RESULT 2025-2026</h2>

<p><b>District:</b> Gajapati</p>
<p><b>Centre Name:</b> Koinpur</p>
<p><b>Centre Code:</b> GK2025</p>

<input type="number" id="roll" placeholder="Enter Roll Number">
<button onclick="searchResult()">Search</button>

<div id="result"></div>

</div>

<script>

var students = {

200:{name:"Mikha Sabar",gk:40,math:45,english:42},
201:{name:"Sanjaya Kumar Mandal",gk:38,math:44,english:40},
202:{name:"Debaraj Gamango",gk:45,math:48,english:44},
203:{name:"Purna Chandra Sabar",gk:35,math:42,english:43},
204:{name:"Sanjeeba Mandal",gk:41,math:46,english:39}

};

function searchResult(){

var roll = document.getElementById("roll").value;
var data = students[roll];

if(data){

var total = data.gk + data.math + data.english;
var status = total >= 120 ? "PASS" : "FAIL";

document.getElementById("result").innerHTML =

"<h3>Result Details</h3>" +
"<p><b>Roll No:</b> " + roll + "</p>" +
"<p><b>Name:</b> " + data.name + "</p>" +

"<table>" +
"<tr><th>Subject</th><th>Marks</th></tr>" +
"<tr><td>GK</td><td>"+data.gk+"</td></tr>" +
"<tr><td>Math</td><td>"+data.math+"</td></tr>" +
"<tr><td>English</td><td>"+data.english+"</td></tr>" +
"</table>" +

"<p><b>Total:</b> " + total + " / 200</p>" +
"<p><b>Pass Mark:</b> 120</p>" +
"<p><b>Status:</b> " + status + "</p>";

}
else{
document.getElementById("result").innerHTML = "<h3>Result Not Found</h3>";
}

}

</script>

</body>
</html>
